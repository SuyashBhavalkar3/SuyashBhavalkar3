<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="100%">
  <defs>
    <!-- Background Gradients -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050814" />
      <stop offset="50%" stop-color="#0b1120" />
      <stop offset="100%" stop-color="#070a13" />
    </linearGradient>
    
    <!-- Accent Teal Glow -->
    <radialGradient id="glow" cx="80%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#00f2fe" stop-opacity="0" />
    </radialGradient>
    
    <!-- Linear Gradient for Lines -->
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.1" />
      <stop offset="50%" stop-color="#4facfe" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#00f2fe" stop-opacity="1" />
    </linearGradient>

    <!-- Drop Shadows/Glow Filters -->
    <filter id="glow-filter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes pulse {
      0%, 100% { r: 4px; opacity: 0.4; }
      50% { r: 7px; opacity: 1; filter: drop-shadow(0 0 6px #00f2fe); }
    }
    @keyframes dash {
      to {
        stroke-dashoffset: -40;
      }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-5px); }
    }
    @keyframes float-reverse {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(5px); }
    }
    .node-active {
      animation: pulse 3s infinite ease-in-out;
    }
    .node-active-delayed {
      animation: pulse 3.5s infinite ease-in-out;
      animation-delay: 1s;
    }
    .flow-line {
      stroke-dasharray: 8, 12;
      animation: dash 2s linear infinite;
    }
    .floating-group {
      animation: float 6s infinite ease-in-out;
    }
    .floating-group-reverse {
      animation: float-reverse 7s infinite ease-in-out;
    }
    .title-text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-weight: 800;
      fill: #ffffff;
      letter-spacing: 4px;
    }
    .subtitle-text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-weight: 500;
      fill: #00f2fe;
      letter-spacing: 2px;
      font-size: 14px;
    }
    .stat-badge {
      fill: #161b22;
      stroke: #30363d;
      rx: 6px;
    }
    .stat-text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      fill: #8b949e;
      font-size: 11px;
    }
  </style>

  <!-- Background Rect -->
  <rect width="800" height="300" fill="url(#bg-grad)" />
  <rect width="800" height="300" fill="url(#glow)" />

  <!-- Diagonal Tech Lines Grid (Subtle) -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="-100" y1="50" x2="900" y2="50" />
    <line x1="-100" y1="150" x2="900" y2="150" />
    <line x1="-100" y1="250" x2="900" y2="250" />
    <line x1="150" y1="-50" x2="150" y2="350" />
    <line x1="350" y1="-50" x2="350" y2="350" />
    <line x1="550" y1="-50" x2="550" y2="350" />
  </g>

  <!-- Floating abstract AI & Network Node Graphic (Right Side) -->
  <g class="floating-group" transform="translate(480, 20)">
    <!-- Connection Lines -->
    <path d="M 50 130 L 150 70 L 220 150 L 150 210 Z" fill="none" stroke="#00f2fe" stroke-opacity="0.15" stroke-width="1.5" />
    <line x1="150" y1="70" x2="130" y2="140" stroke="#00f2fe" stroke-opacity="0.2" stroke-width="1" />
    <line x1="50" y1="130" x2="130" y2="140" stroke="#00f2fe" stroke-opacity="0.2" stroke-width="1" />
    <line x1="150" y1="210" x2="130" y2="140" stroke="#00f2fe" stroke-opacity="0.2" stroke-width="1" />
    <line x1="220" y1="150" x2="130" y2="140" stroke="#00f2fe" stroke-opacity="0.2" stroke-width="1" />

    <!-- Animated Data Flow Line -->
    <path d="M 50 130 L 150 70 L 220 150 L 150 210 L 50 130" fill="none" stroke="url(#line-grad)" stroke-width="2" class="flow-line" />

    <!-- Nodes -->
    <circle cx="50" cy="130" r="5" fill="#4facfe" />
    <circle cx="150" cy="70" r="5" fill="#00f2fe" class="node-active" />
    <circle cx="220" cy="150" r="5" fill="#4facfe" />
    <circle cx="150" cy="210" r="5" fill="#00f2fe" class="node-active-delayed" />
    <circle cx="130" cy="140" r="4" fill="#ffffff" stroke="#00f2fe" stroke-width="1" />
  </g>
  
  <g class="floating-group-reverse" transform="translate(480, 20)">
    <!-- Secondary neural-like subnodes -->
    <circle cx="80" cy="70" r="3" fill="#00f2fe" fill-opacity="0.3" />
    <line x1="50" y1="130" x2="80" y2="70" stroke="#00f2fe" stroke-opacity="0.1" stroke-width="1" />
    <circle cx="250" cy="100" r="3.5" fill="#00f2fe" class="node-active" />
    <line x1="220" y1="150" x2="250" y2="100" stroke="#00f2fe" stroke-opacity="0.1" stroke-width="1" />
    <circle cx="200" cy="230" r="3" fill="#4facfe" fill-opacity="0.4" />
    <line x1="150" y1="210" x2="200" y2="230" stroke="#00f2fe" stroke-opacity="0.15" stroke-width="1" />
  </g>

  <!-- Left Side Text Content -->
  <g transform="translate(60, 110)">
    <!-- Greeting/Status Tag -->
    <rect x="0" y="-45" width="95" height="22" rx="11" fill="#00f2fe" fill-opacity="0.1" stroke="#00f2fe" stroke-opacity="0.3" stroke-width="1" />
    <circle cx="12" cy="-34" r="3" fill="#00f2fe" class="node-active" />
    <text x="24" y="-30" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="700" fill="#00f2fe" letter-spacing="1">SYSTEMS ON</text>

    <!-- Main Title -->
    <text x="0" y="10" font-size="34" class="title-text">SUYASH BHAVALKAR</text>
    
    <!-- Subtitle / Role -->
    <text x="0" y="38" class="subtitle-text">GENAI &amp; DISTRIBUTED SYSTEMS ENGINEER</text>

    <!-- Code metrics line -->
    <text x="0" y="65" font-family="Consolas, Monaco, monospace" font-size="11" fill="#58a6ff" opacity="0.8">
      const dev = { focus: ["AI/ML Orchestration", "High-Perf Backend"], latency: "&amp;lt;450ms" };
    </text>
  </g>
  
  <!-- Subtle Bottom Borders -->
  <rect x="0" y="297" width="800" height="3" fill="url(#line-grad)" opacity="0.8" />
</svg>
